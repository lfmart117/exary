<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <link rel="icon" type="image/png" href="assets/favicon.png">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exary HQ — Restablecer contraseña</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="js/early-theme.js"></script>
<script>(function(){var s=document.documentElement.style;s.setProperty("--accent-1","#4a6cf7");s.setProperty("--accent-2","#e63946");s.setProperty("--grad","linear-gradient(135deg,#4a6cf7,#e63946)");s.setProperty("--grad-h","linear-gradient(135deg,#4a6cf7dd,#e63946dd)");s.setProperty("--grad-soft","#4a6cf71a")})();</script>
<link rel="stylesheet" href="css/global.css"/>
<link rel="stylesheet" href="css/index.css"/>
</head>
<body>
<div class="page-bg"></div>

<script src="js/icons.js"></script>
<script src="js/state.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/dialogs.js"></script>
<script src="js/theme.js"></script>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark">Ex</div>
      <div class="brand-text">Exary HQ</div>
    </div>

    <h2 class="auth-title">Nueva contraseña</h2>
    <p class="auth-subtitle">Elige una contraseña nueva para tu cuenta</p>

    <form id="resetForm" class="auth-form active">
      <div class="form-group">
        <label>Contraseña nueva</label>
        <input type="password" id="newPass" class="input" placeholder="Mínimo 8 caracteres" required minlength="8"/>
      </div>
      <div class="form-group">
        <label>Confirma la contraseña</label>
        <input type="password" id="newPass2" class="input" placeholder="Repite la contraseña" required minlength="8"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">
        <span>Cambiar contraseña</span>
      </button>
      <div id="resetError" class="auth-error" style="display:none"></div>
      <a href="index.html" class="forgot-link" style="display:block;text-align:center;margin-top:14px">Volver al login</a>
    </form>
  </div>
</div>

<script>
(async () => {
  if (!_sb) {
    document.getElementById('resetError').textContent = 'Supabase no disponible';
    document.getElementById('resetError').style.display = 'block';
    return;
  }

  // Supabase pone el token en el hash de la URL — getSession lo procesa
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) {
    document.getElementById('resetError').textContent =
      'Link de recuperación inválido o expirado. Solicita uno nuevo desde el login.';
    document.getElementById('resetError').style.display = 'block';
    document.querySelector('button[type=submit]').disabled = true;
  }
})();

document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  const pass  = document.getElementById('newPass').value;
  const pass2 = document.getElementById('newPass2').value;
  const err   = document.getElementById('resetError');

  if (pass !== pass2)  { err.textContent = 'Las contraseñas no coinciden'; err.style.display='block'; return; }
  if (pass.length < 8) { err.textContent = 'Mínimo 8 caracteres'; err.style.display='block'; return; }

  err.style.display = 'none';
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true;
  btn.querySelector('span').textContent = 'Guardando...';

  const { error } = await _sb.auth.updateUser({ password: pass });

  btn.disabled = false;
  btn.querySelector('span').textContent = 'Cambiar contraseña';

  if (error) {
    err.textContent = error.message;
    err.style.display = 'block';
  } else {
    await ExaryDialog.alert(
      'Tu contraseña se actualizó correctamente. Ahora puedes iniciar sesión.',
      { title: '¡Listo!', icon: 'check' }
    );
    await _sb.auth.signOut();
    window.location.href = 'index.html';
  }
});
</script>
</body>
</html>
